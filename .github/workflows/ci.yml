name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download NLTK data
        # rag_tokenizer.py / synonym.py need WordNet + Punkt at import/runtime
        run: python -m nltk.downloader wordnet omw-1.4 punkt punkt_tab

      - name: Run tests
        # DashScope and Elasticsearch are mocked, so no external services are needed.
        run: pytest -q
